name: CI/CD

on:
    pull_request:
        branches:
            - dev
            - main
    push:
        branches:
            - dev
            - main

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    check:
        name: Check Code Quality
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3
              with:
                  fetch-depth: 1
            - name: Setup Tools
              uses: tihlde/tihlde-workflows/.github/setup-bun@v1

            - name: Check linting
              run: bun run lint

            - name: Check types
              run: bun run typecheck

            - name: Check building
              run: bun run build

            - name: Run tests
              run: bun run test -- --log-order=stream
